<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 260" role="img" aria-label="千葉都市モノレール">
  <title>千葉都市モノレール</title>
  <defs>
    <pattern id="fvMonoHalftone" x="0" y="0" width="14" height="14" patternUnits="userSpaceOnUse">
      <circle cx="7" cy="7" r="1.6" fill="#082A48" opacity="0.32"/>
    </pattern>
    <linearGradient id="fvMonoBeamShine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F1F4F8"/>
      <stop offset="1" stop-color="#B7BEC9"/>
    </linearGradient>
  </defs>

  <!-- ===== Guideway beam (suspended-monorail track above the car) ===== -->
  <rect x="0" y="4" width="760" height="30" fill="url(#fvMonoBeamShine)" stroke="#0A1A2E" stroke-width="3"/>
  <rect x="6" y="9" width="748" height="3" fill="#FFFFFF" opacity="0.85"/>
  <rect x="0" y="30" width="760" height="6" fill="#2C333F"/>
  <line x1="0" y1="36" x2="760" y2="36" stroke="#0A1A2E" stroke-width="2"/>

  <!-- ===== Bogie / hanger boxes between beam and car top ===== -->
  <g stroke="#0A1A2E" stroke-width="3">
    <rect x="150" y="36" width="78" height="26" fill="#4A525E"/>
    <rect x="410" y="36" width="78" height="26" fill="#4A525E"/>
    <rect x="640" y="36" width="78" height="26" fill="#4A525E"/>
  </g>

  <!-- ===== Car body (nose on LEFT) ===== -->
  <!-- Full body silhouette in darker teal -->
  <path d="
    M 92 62
    Q 40 62 22 140
    Q 40 220 92 220
    L 760 220
    L 760 62
    Z
  " fill="#0F7BB0" stroke="#0A1A2E" stroke-width="4"/>

  <!-- Upper body (lighter cyan) -->
  <path d="
    M 92 62
    Q 40 62 26 132
    L 760 132
    L 760 62
    Z
  " fill="#3ABEEA"/>

  <!-- Halftone dots overlay on lower panel -->
  <path d="
    M 26 138
    Q 40 220 92 220
    L 760 220
    L 760 138
    Z
  " fill="url(#fvMonoHalftone)"/>

  <!-- Yellow livery stripe just under windows -->
  <rect x="24" y="130" width="736" height="6" fill="#FFD24C"/>
  <rect x="24" y="136" width="736" height="2" fill="#E8A424"/>

  <!-- ===== Windows band (individual windows) ===== -->
  <rect x="96" y="78" width="612" height="44" fill="#D5ECF6" stroke="#0A1A2E" stroke-width="2.5"/>

  <!-- Window dividers -->
  <g stroke="#0A1A2E" stroke-width="3">
    <line x1="184" y1="78" x2="184" y2="122"/>
    <line x1="272" y1="78" x2="272" y2="122"/>
    <line x1="360" y1="78" x2="360" y2="122"/>
    <line x1="448" y1="78" x2="448" y2="122"/>
    <line x1="536" y1="78" x2="536" y2="122"/>
    <line x1="624" y1="78" x2="624" y2="122"/>
  </g>

  <!-- Window inner tint (softer blue rectangles) -->
  <g fill="#A9D5EA" opacity="0.55">
    <rect x="100" y="82" width="80" height="20"/>
    <rect x="188" y="82" width="80" height="20"/>
    <rect x="276" y="82" width="80" height="20"/>
    <rect x="364" y="82" width="80" height="20"/>
    <rect x="452" y="82" width="80" height="20"/>
    <rect x="540" y="82" width="80" height="20"/>
    <rect x="628" y="82" width="76" height="20"/>
  </g>

  <!-- ===== Nose windshield (dark, at far left) ===== -->
  <path d="M 96 78 Q 52 78 32 132 L 96 132 Z" fill="#164C74" stroke="#0A1A2E" stroke-width="3"/>
  <path d="M 78 82 Q 58 96 44 122" stroke="#8FC7E0" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 68 84 Q 52 100 40 124" stroke="#C6E1EE" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.75"/>

  <!-- ===== Doors (dark vertical panels with window slit) ===== -->
  <g>
    <rect x="230" y="66" width="30" height="150" fill="#0B3E60" stroke="#0A1A2E" stroke-width="2.5"/>
    <rect x="234" y="84" width="22" height="34" fill="#D5ECF6" stroke="#0A1A2E" stroke-width="1.5"/>
    <line x1="245" y1="140" x2="245" y2="210" stroke="#062B47" stroke-width="1.5"/>

    <rect x="494" y="66" width="30" height="150" fill="#0B3E60" stroke="#0A1A2E" stroke-width="2.5"/>
    <rect x="498" y="84" width="22" height="34" fill="#D5ECF6" stroke="#0A1A2E" stroke-width="1.5"/>
    <line x1="509" y1="140" x2="509" y2="210" stroke="#062B47" stroke-width="1.5"/>
  </g>

  <!-- Number/sign plate under first door -->
  <rect x="316" y="160" width="70" height="18" rx="3" fill="#FFFFFF" stroke="#0A1A2E" stroke-width="2"/>
  <text x="351" y="174" font-family="'Zen Maru Gothic','Hiragino Maru Gothic ProN',sans-serif" font-size="12" font-weight="900" fill="#0F6FA8" text-anchor="middle">1801</text>

  <!-- ===== Headlight near nose bottom ===== -->
  <circle cx="58" cy="182" r="11" fill="#FFF3B0" stroke="#0A1A2E" stroke-width="2.5"/>
  <circle cx="58" cy="182" r="5" fill="#FFD34A"/>
  <circle cx="55.5" cy="180" r="1.6" fill="#FFFFFF"/>

  <!-- ===== Bottom edge accent lines ===== -->
  <line x1="94" y1="220" x2="760" y2="220" stroke="#0A1A2E" stroke-width="4"/>
  <line x1="30" y1="170" x2="92" y2="170" stroke="#0A1A2E" stroke-width="2" opacity="0.5"/>

  <!-- Small nose bumper highlight -->
  <path d="M 34 148 Q 30 190 92 208" stroke="#0A1A2E" stroke-width="2.5" fill="none"/>
</svg>
